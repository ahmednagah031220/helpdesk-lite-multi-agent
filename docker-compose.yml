services:
  postgres:
    # pgvector-enabled image for hybrid / semantic knowledge retrieval
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: helpdesk_lite
    ports:
      - "5433:5432"
    volumes:
      - helpdesk_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - helpdesk_redis:/data

  # GPU Ollama — requires NVIDIA Container Toolkit (see scripts/install-nvidia-container-toolkit.sh).
  # Verify: docker compose exec ollama nvidia-smi && docker compose exec ollama ollama ps
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OLLAMA_NUM_PARALLEL: "1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Local SMTP inbox — UI at http://127.0.0.1:8025
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  # Echo webhook receiver — inspect POSTs at http://127.0.0.1:8089/
  webhook:
    image: mendhak/http-https-echo:31
    ports:
      - "8089:8080"

volumes:
  helpdesk_pgdata:
  helpdesk_redis:
  ollama_data:
