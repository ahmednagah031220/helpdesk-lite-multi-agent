name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/helpdesk_lite

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Mock evaluation harness
        run: npm run eval
        env:
          EVAL_MIN_ACCURACY: "0.7"
          EVAL_MIN_VALID_RATE: "0.8"
          EVAL_MIN_COMPLETION_RATE: "0.8"

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-report
          path: |
            submission/final-project/evaluation-report*.json
          if-no-files-found: warn
